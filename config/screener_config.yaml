metrics:

  roe_min:
    column: return_on_equity_pct
    operator: min

  debt_to_equity_max:
    column: debt_to_equity
    operator: max
    financial_sector_bypass: true

  fcf_min:
    column: free_cash_flow_cr
    operator: min

  revenue_cagr_5yr_min:
    column: revenue_cagr_5yr
    operator: min

  pat_cagr_5yr_min:
    column: pat_cagr_5yr
    operator: min

  opm_min:
    column: operating_profit_margin_pct
    operator: min

  pe_max:
    column: pe_ratio
    operator: max

  pb_max:
    column: pb_ratio
    operator: max

  dividend_yield_min:
    column: dividend_yield_pct
    operator: min

  icr_min:
    column: interest_coverage
    operator: min
    debt_free_pass: true

  market_cap_min:
    column: market_cap_crore
    operator: min

  net_profit_min:
    column: net_profit
    operator: min

  eps_cagr_min:
    column: eps_cagr_5yr
    operator: min

  asset_turnover_min:
    column: asset_turnover
    operator: min

  sales_min:
    column: sales
    operator: min
  
  dividend_payout_max:
    column: dividend_payout_ratio_pct
    operator: max

  debt_to_equity_equal:
    column: debt_to_equity
    operator: equal

  revenue_cagr_3yr_min:
    column: revenue_cagr_3yr
    operator: min


presets:

  quality_compounder:
    roe_min: 15
    debt_to_equity_max: 1.0
    fcf_min: 0
    revenue_cagr_5yr_min: 10

  value_pick:
    pe_max: 20
    pb_max: 3.0
    debt_to_equity_max: 2.0
    dividend_yield_min: 1

  growth_accelerator:
    pat_cagr_5yr_min: 20
    revenue_cagr_5yr_min: 15
    debt_to_equity_max: 2.0

  dividend_champion:
    dividend_yield_min: 2
    dividend_payout_max: 80
    fcf_min: 0

  debt_free_blue_chip:
    debt_to_equity_equal: 0
    roe_min: 12
    sales_min: 5000

  turnaround_watch:
    revenue_cagr_3yr_min: 10
    fcf_min: 0
    de_declining: true